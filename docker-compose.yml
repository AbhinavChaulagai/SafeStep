services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: safestep
      POSTGRES_USER: safestep
      POSTGRES_PASSWORD: safestep
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safestep -d safestep"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
